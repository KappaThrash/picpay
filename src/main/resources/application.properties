spring.config.import=optional:file:.env[.properties]

spring.application.name=picpay
spring.datasource.url=jdbc:postgresql://localhost:5433/picpay
spring.datasource.username=picpay_user
spring.datasource.password=picpay
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=false

spring.rabbitmq.addresses=${RABBITMQ_ADDRESS}
broker.queue.email.name=${EMAIL_QUEUE}
spring.rabbitmq.listener.simple.default-requeue-rejected=false
